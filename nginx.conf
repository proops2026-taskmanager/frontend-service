server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to api-gateway (docker-compose only; EKS uses ingress rewrite)
    # /api/tasks → http://api-gateway:8080/tasks
    location /api/ {
        proxy_pass http://api-gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — all routes served by index.html, React Router handles the rest
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively; Vite hashes filenames on build
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable access log for health probes to keep logs clean
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
